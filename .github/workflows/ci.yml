name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Lint PHP sources
        run: |
          find src bin -type f -name '*.php' -print0 | xargs -0 -n1 php -l
        shell: bash

      - name: Run doctor
        run: php bin/wp-boost doctor

      - name: Install into fixture (interactive defaults --yes)
        run: |
          mkdir -p /tmp/fixture-yes && cd /tmp/fixture-yes
          echo '<?php /* Plugin Name: Demo */' > demo.php
          php "$GITHUB_WORKSPACE/bin/wp-boost" install \
            --preset=plugin \
            --agents=claude_code,cursor \
            --yes
        shell: bash

      - name: Install into fixture (non-interactive, piped input)
        run: |
          mkdir -p /tmp/fixture-ni && cd /tmp/fixture-ni
          echo '<?php /* Plugin Name: Demo */' > demo.php
          echo '' | php "$GITHUB_WORKSPACE/bin/wp-boost" install --preset=plugin
        shell: bash

      - name: Assert skills were written (--yes mode)
        run: |
          test -d /tmp/fixture-yes/.claude/skills/wp-plugin-development
          test -f /tmp/fixture-yes/.cursor/rules/wp-plugin-development.mdc
          test -f /tmp/fixture-yes/wp-boost.lock.json
        shell: bash

      - name: Assert skills were written (non-interactive mode)
        run: |
          test -f /tmp/fixture-ni/wp-boost.lock.json
        shell: bash

      - name: Update from bundled snapshot
        run: |
          cd /tmp/fixture-yes
          php "$GITHUB_WORKSPACE/bin/wp-boost" update
        shell: bash

      - name: Sync bundle from upstream (network)
        run: php bin/wp-boost sync --upstream

      - name: Verify bundle metadata written
        run: |
          test -f skills/.bundle.json
          php -r '$j=json_decode(file_get_contents("skills/.bundle.json"),true); exit(preg_match("/^[0-9a-f]{40}$/",$j["sha"]??"")?0:1);'
        shell: bash